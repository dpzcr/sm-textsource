<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Image Display</title>
</head>
<body>
<div id="custom-product-message"></div>

<script>
(function () {
    const CONFIG = {
        containerWidth: "100%",
        containerMaxWidth: "1500px",
        imageWidth: "100%",
        imageHeight: "auto",
        borderRadius: "8px",
        objectFit: "contain",
        marginTop: "10px",
        marginBottom: "10px",
        verticalGap: "15px",
        mediaBaseUrl: "https://raw.githubusercontent.com/dpzcr/sm-textsource/main/sm-image/",
        masterJsonUrl: "https://raw.githubusercontent.com/dpzcr/sm-textsource/main/sm-master.json",
        debug: false
    };

    const container = document.getElementById("custom-product-message");
    if (!container) return;

    container.style.cssText = `
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: ${CONFIG.containerWidth};
        max-width: ${CONFIG.containerMaxWidth};
        margin: ${CONFIG.marginTop} auto ${CONFIG.marginBottom} auto;
        padding: 0;
        border: none;
        background: transparent;
        gap: ${CONFIG.verticalGap};
    `;

    function log(msg) {
        if (CONFIG.debug) console.log("[Product Image]", msg);
    }

    function generateImageKey(rawTitle) {
        if (!rawTitle || typeof rawTitle !== 'string') return null;
        let beforePipe = rawTitle.split('|')[0];
        let cleaned = beforePipe.trim().toLowerCase();
        let slug = cleaned.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        slug = slug.replace(/-+/g, '-').replace(/^-|-$/g, '');
        return `info-${slug}`;
    }

    async function fetchImages(imageKey) {
        try {
            const res = await fetch(`${CONFIG.masterJsonUrl}?t=${Date.now()}`);
            const data = await res.json();
            const entry = data[imageKey];
            if (entry && Array.isArray(entry.images) && entry.images.length > 0) {
                return entry.images;
            }
            log(`Key "${imageKey}" not found or has no images array`);
            return [];
        } catch (e) {
            log("Failed to fetch master JSON: " + e);
            return [];
        }
    }

    function appendImageAndWait(url, index) {
        return new Promise((resolve) => {
            const img = document.createElement('img');
            img.alt = `Product image ${index}`;
            img.style.cssText = `
                width: ${CONFIG.imageWidth};
                height: ${CONFIG.imageHeight};
                border-radius: ${CONFIG.borderRadius};
                object-fit: ${CONFIG.objectFit};
                display: block;
                margin: 0 auto;
            `;
            img.onload = () => { log(`Image ${index} loaded`); resolve(); };
            img.onerror = () => {
                log(`Image ${index} failed to load: ${url}`);
                container.removeChild(img);
                resolve();
            };
            img.src = url;
            container.appendChild(img);
        });
    }

    async function loadImagesSequentially(imageKey, imageNames) {
        for (let i = 0; i < imageNames.length; i++) {
            const url = `${CONFIG.mediaBaseUrl}${imageKey}/${imageNames[i]}.webp`;
            await appendImageAndWait(url, i + 1);
        }
        log(`Done loading ${imageNames.length} image(s) for ${imageKey}`);
    }

    function extractProductName() {
        try {
            const parentDoc = window.parent.document;
            if (!parentDoc) return null;
            let productEl = parentDoc.querySelector("h1.block-product__title");
            if (productEl && productEl.innerText.trim()) return productEl.innerText.trim();
            const allH1s = parentDoc.querySelectorAll("h1");
            for (let i = 0; i < allH1s.length; i++) {
                const text = allH1s[i].innerText.trim();
                if (text && text.length > 2 && text.length < 200 &&
                    !text.toLowerCase().includes("search") &&
                    !text.toLowerCase().includes("error")) {
                    return text;
                }
            }
            return null;
        } catch(e) {
            log("Cannot access parent document");
            return null;
        }
    }

    let findInterval = setInterval(async () => {
        const productName = extractProductName();
        if (productName) {
            clearInterval(findInterval);
            const imageKey = generateImageKey(productName);
            log(`Product: ${productName} | Key: ${imageKey}`);

            const imageNames = await fetchImages(imageKey);
            if (imageNames.length > 0) {
                await loadImagesSequentially(imageKey, imageNames);
            } else {
                container.innerHTML = "";
            }
        }
    }, 300);

    setTimeout(() => {
        if (findInterval) {
            clearInterval(findInterval);
            log("Timeout - no product detected");
        }
    }, 15000);
})();
</script>
</body>
</html>
