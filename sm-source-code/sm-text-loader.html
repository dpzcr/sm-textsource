<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="custom-product-text"></div>
<script>
(function () {
    const JSON_URL = "https://raw.githubusercontent.com/dpzcr/sm-textsource/main/sm-master.json";
    const container = document.getElementById("custom-product-text");
    if (!container) return;

    // Start at 20px height, hidden overflow, smooth transition
    container.style.height = '20px';
    container.style.overflow = 'hidden';
    container.style.transition = 'height 0.4s ease';

    function generateKey(rawTitle) {
        if (!rawTitle || typeof rawTitle !== 'string') return null;
        let slug = rawTitle.split('|')[0].trim().toLowerCase();
        slug = slug.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        slug = slug.replace(/-+/g, '-').replace(/^-|-$/g, '');
        return `info-${slug}`;
    }
    
    function extractProductName() {
        try {
            const parentDoc = window.parent.document;
            const h1 = parentDoc.querySelector("h1");
            return h1 ? h1.innerText.trim() : null;
        } catch(e) { 
            // Fallback for preview mode
            const h1 = document.querySelector("h1");
            return h1 ? h1.innerText.trim() : null;
        }
    }
    
    function expandToFit() {
        // Force reflow then expand to full content height
        let fullHeight = container.scrollHeight;
        if (fullHeight > 20) {
            container.style.height = fullHeight + 'px';
            container.addEventListener('transitionend', function() {
                container.style.height = 'auto';
                container.style.overflow = '';
            }, { once: true });
        }
    }
    
    function displayText(text) {
        container.innerHTML = `
            <div style="
                font-family: 'Outfit', sans-serif;
                font-size: 15px;
                line-height: 1.7;
                color: #333;
                margin: 0;
                padding: 0;
            ">${text}</div>
        `;
        // Small delay to ensure DOM renders, then expand
        setTimeout(expandToFit, 10);
    }
    
    const interval = setInterval(async () => {
        const productName = extractProductName();
        if (productName) {
            clearInterval(interval);
            const key = generateKey(productName);
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                const text = data[key]?.ts;
                if (text) displayText(text);
            } catch(e) {
                console.error("Failed to load text source:", e);
            }
        }
    }, 300);
    setTimeout(() => clearInterval(interval), 15000);
})();
</script>
</body>
</html>
